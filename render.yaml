services:
  - type: web
    name: exploration-management-pro-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci && npm run prisma:generate && npm run prisma:deploy && npm run seed:opex-taxonomy && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: API_PREFIX
        value: /api
